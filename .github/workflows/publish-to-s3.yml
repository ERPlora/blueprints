name: Sync assets to S3

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::363427305647:role/github-actions-deploy
          aws-region: eu-west-1

      - name: Sync WebP assets to S3
        run: |
          aws s3 sync assets/ s3://erplora-storage/assets/ \
            --delete \
            --exclude "*" \
            --include "*.webp" \
            --cache-control "max-age=86400" \
            --content-type "image/webp"
          echo "Synced $(find assets -name '*.webp' | wc -l) WebP files to s3://erplora-storage/assets/"
